name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'adopt'

    - name: Setup Gradle
      uses: gradle/gradle-build-action@v2
      with:
        gradle-version: 8.2

    - name: Validate Gradle wrapper
      run: |
        cd MuseEEGAndroid
        chmod +x gradlew
        ./gradlew --version

    - name: Build Debug APK
      working-directory: ./MuseEEGAndroid
      run: ./gradlew clean assembleDebug

    - name: Build Release APK
      working-directory: ./MuseEEGAndroid
      run: ./gradlew clean assembleRelease
      continue-on-error: true

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: apk-debug
        path: MuseEEGAndroid/app/build/outputs/apk/debug/*.apk

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: apk-release
        path: MuseEEGAndroid/app/build/outputs/apk/release/*.apk
      continue-on-error: true
